# ─────────────────────────────────────────────────────────────────────────────
# CampusHub — application.properties
# IMPORTANT: Change server.port to your team's assigned port (see the lab guide)
# ─────────────────────────────────────────────────────────────────────────────

# Server port — CHANGE THIS to your team's assigned port (8081–8086)
server.port=8080

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:5432/campushub
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# GraphQL endpoint
spring.graphql.path=/graphql

# GraphiQL browser playground — do NOT disable this
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
